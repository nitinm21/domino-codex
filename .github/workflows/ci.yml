name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: brew install opus pkg-config autoconf automake libtool
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --manifest-path recorder/Cargo.toml --check
      - run: cargo clippy --manifest-path recorder/Cargo.toml -- -D warnings
      - name: Run Rust tests except flaky concurrent start integration test
        run: cargo test --manifest-path recorder/Cargo.toml -- --skip two_concurrent_starts_exactly_one_succeeds
